# Task2 CI/CD: перевіряє inventory і playbook, після чого застосовує Ansible-конфігурацію на push.
name: Ansible Kubernetes Stack CI/CD

on:
  pull_request:
    branches: [ main ]
    paths:
      - task2/ansible/**
      - .github/workflows/ansible-k8s-cicd.yml
  push:
    branches: [ main ]
    paths:
      - task2/ansible/**
      - .github/workflows/ansible-k8s-cicd.yml

permissions:
  contents: read

jobs:
  validate:
    name: Validate and Dry-Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.6

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: ANSIBLE_SSH_PRIVATE_KEY"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ansible_key"
          chmod 600 "$RUNNER_TEMP/ansible_key"

      - name: Validate static inventory
        run: |
          if [ ! -f task2/ansible/inventory/hosts.ini ]; then
            echo "::error::Missing task2/ansible/inventory/hosts.ini"
            exit 1
          fi
          if ! grep -Eq '^[^#[:space:]].*ansible_user=' task2/ansible/inventory/hosts.ini; then
            echo "::error::Inventory has no configured hosts with ansible_user"
            exit 1
          fi

          awk 'NF && $1 !~ /^\[/' task2/ansible/inventory/hosts.ini | while read -r host _; do
            ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
          done

      - name: Check SSH readiness (soft)
        id: ssh_ready_validate
        run: |
          ready=true
          awk 'NF && $1 !~ /^\[/' task2/ansible/inventory/hosts.ini | while read -r host _; do
            echo "Checking SSH readiness for $host..."
            host_ready=false
            for i in $(seq 1 8); do
              if ssh -o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=no -i "$RUNNER_TEMP/ansible_key" ubuntu@"$host" "echo ok" >/dev/null 2>&1; then
                echo "SSH is ready for $host"
                host_ready=true
                break
              fi
              sleep 5
            done
            if [ "$host_ready" = "false" ]; then
              echo "::warning::SSH is not ready for $host; dry-run will be skipped in validate job"
              ready=false
            fi
          done
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Ansible syntax check
        working-directory: task2/ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/task2/ansible/ansible.cfg
        run: |
          ansible-playbook playbooks/install-k8s-stack.yml --syntax-check

      - name: Ansible dry-run check mode
        if: steps.ssh_ready_validate.outputs.ready == 'true'
        working-directory: task2/ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/task2/ansible/ansible.cfg
          ANSIBLE_TIMEOUT: "60"
        run: |
          MINIKUBE_PROFILE_VAL="minikube"
          PROXY_BIND_VAL="0.0.0.0"
          PROXY_PORT_VAL="8001"

          ansible-playbook playbooks/install-k8s-stack.yml \
            --check --diff \
            --private-key "$RUNNER_TEMP/ansible_key" \
            --extra-vars "minikube_profile=${MINIKUBE_PROFILE_VAL}" \
            --extra-vars "proxy_bind_address=${PROXY_BIND_VAL}" \
            --extra-vars "proxy_port=${PROXY_PORT_VAL}"

      - name: Skip dry-run when SSH unavailable
        if: steps.ssh_ready_validate.outputs.ready != 'true'
        run: echo "Skipping dry-run in validate job because SSH is temporarily unavailable."

  apply:
    name: Apply Installation
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.6

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: ANSIBLE_SSH_PRIVATE_KEY"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ansible_key"
          chmod 600 "$RUNNER_TEMP/ansible_key"

      - name: Validate static inventory
        run: |
          if [ ! -f task2/ansible/inventory/hosts.ini ]; then
            echo "::error::Missing task2/ansible/inventory/hosts.ini"
            exit 1
          fi
          if ! grep -Eq '^[^#[:space:]].*ansible_user=' task2/ansible/inventory/hosts.ini; then
            echo "::error::Inventory has no configured hosts with ansible_user"
            exit 1
          fi

          awk 'NF && $1 !~ /^\[/' task2/ansible/inventory/hosts.ini | while read -r host _; do
            ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
          done

      - name: Wait for SSH readiness
        run: |
          awk 'NF && $1 !~ /^\[/' task2/ansible/inventory/hosts.ini | while read -r host _; do
            echo "Checking SSH readiness for $host..."
            for i in $(seq 1 8); do
              if ssh -o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=no -i "$RUNNER_TEMP/ansible_key" ubuntu@"$host" "echo ok" >/dev/null 2>&1; then
                echo "SSH is ready for $host"
                break
              fi
              if [ "$i" -eq 8 ]; then
                echo "::error::SSH is not ready for $host after retries"
                exit 1
              fi
              sleep 5
            done
          done

      - name: Install Kubernetes stack
        working-directory: task2/ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/task2/ansible/ansible.cfg
          ANSIBLE_TIMEOUT: "60"
        run: |
          MINIKUBE_PROFILE_VAL="minikube"
          PROXY_BIND_VAL="0.0.0.0"
          PROXY_PORT_VAL="8001"

          ansible-playbook playbooks/install-k8s-stack.yml \
            --private-key "$RUNNER_TEMP/ansible_key" \
            --extra-vars "minikube_profile=${MINIKUBE_PROFILE_VAL}" \
            --extra-vars "proxy_bind_address=${PROXY_BIND_VAL}" \
            --extra-vars "proxy_port=${PROXY_PORT_VAL}"