# Task3 Helm template: рендерить Kubernetes Service для доступу до pod-ів застосунку.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "django-hello-world.fullname" . }}
  labels:
    {{- include "django-hello-world.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "django-hello-world.selectorLabels" . | nindent 4 }}

