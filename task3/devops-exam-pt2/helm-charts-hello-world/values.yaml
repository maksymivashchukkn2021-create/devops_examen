replicaCount: 1

image:
  repository: "<docker_registry_url>/<image_name>"
  tag: "dev-latest"
  pullPolicy: IfNotPresent
  pullSecret: ""

service:
  type: ClusterIP
  port: "dev_port"
  targetPort: 8000 # App port

appConfig:
  debug: "False"

django:
  debug: "False"
  allowedHosts: "*"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: null
  targetMemoryUtilizationPercentage: null

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
